version: '3.8'

services:
  app:
    build: .
    container_name: butterfly_app
    restart: unless-stopped
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    ports:
      - "127.0.0.1:8001:8000" # bind to localhost:8001 to avoid colliding with host 8000
    volumes:
      - .:/app:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
