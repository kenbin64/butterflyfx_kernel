# pytest.ini
# Configuration for running the Butterfly core test suite.
# Place this file at the repository root (next to run_tests.sh).

[pytest]

# Directories where pytest will look for tests
testpaths = 
    tests

# File patterns pytest will treat as test modules
python_files = 
    test_*.py
    *_test.py

# Function and class name patterns
python_functions = 
    test_*

python_classes = 
    Test*

# Show local variables in tracebacks for easier debugging
addopts = 
    -ra
    --showlocals
    --disable-warnings
    --strict-markers

# Ensure warnings are visible and treated consistently
filterwarnings =
    error::DeprecationWarning
    ignore::UserWarning

# Encoding for test files
console_output_style = classic
