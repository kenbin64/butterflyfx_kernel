{% extends 'base.html' %}
{% block title %}Register — ButterflyFX{% endblock %}
{% block content %}
  <h2>Register for an API key</h2>
  <p>Provide a name for your key (e.g., 'My dev machine').</p>
  <form method="post" action="/register" class="form">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required class="input" />
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Create API Key</button>
    </div>
  </form>
{% endblock %}
