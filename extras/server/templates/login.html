{% extends 'base.html' %}
{% block title %}Sign in — ButterflyFX{% endblock %}
{% block content %}
  <h2>Sign in</h2>
  {% if error %}
    <p class="muted">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="form">
    <label for="api_key">API Key</label>
    <input id="api_key" name="api_key" type="text" required class="input" />
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Sign in</button>
    </div>
  </form>
{% endblock %}
