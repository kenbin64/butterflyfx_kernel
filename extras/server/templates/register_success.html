{% extends 'base.html' %}
{% block title %}Registration complete{% endblock %}
{% block content %}
  <h2>API Key created</h2>
  <p>Thanks {{ name }} — your API key is below. Store it securely; this is shown only once.</p>
  <pre class="pre-key">{{ key }}</pre>
  <p><a href="/login" class="btn btn-primary">Sign in with this key</a></p>
{% endblock %}
