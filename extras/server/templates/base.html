<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}ButterflyFX{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="bg-starfield">
    <div class="bg-galaxy"></div>
    <div class="top-nav">
      <div class="brand">
        <a href="/" class="logo-link" aria-label="ButterflyFX home">
          <img src="/static/logo.svg" alt="ButterflyFX" class="logo" />
        </a>
        <div class="brand-text">ButterflyFX</div>
      </div>
      <div class="nav-actions">
        <a class="nav-link" href="/static/styleguide.html">Style Guide</a>
        <a class="nav-link" href="/static/benefits.html">About</a>
        <a class="nav-link" href="#">Register</a>
        <a class="btn btn-primary" href="#">Sign in</a>
      </div>
    </div>

    <div class="app-layout">
      <aside class="side-panel">
        <nav>
          <ul class="side-links">
            <li><a href="/">🏠 Home</a></li>
            <li><a href="/static/benefits.html">✨ Why ButterflyFX</a></li>
            <li><a href="/static/sitemap.html">🗺️ Sitemap</a></li>
            <li><a href="/downloads/butterflyfx-extension.zip">⬇️ Downloads</a></li>
            <li><a href="https://theconduit.me" target="_blank">🔗 The Conduit</a></li>
          </ul>
        </nav>
      </aside>

      <main class="main-area">
        <div class="panel card">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>

    <footer class="muted" style="text-align:center;padding:1rem 0">© ButterflyFX • 2026</footer>
  </body>
</html>
