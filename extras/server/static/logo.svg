<?xml version="1.0" encoding="UTF-8"?>
<!-- Dark-background variant of the ButterflyFX logo -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512" role="img" aria-label="ButterflyFX logo (dark)">
  <rect width="100%" height="100%" fill="#071728"/>
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="1"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="f1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(100,100)">
    <!-- Left wing -->
    <path d="M-6,-6 C-46,-36 -86,-6 -46,28 C-30,44 -8,38 -6,6 Z"
          fill="url(#g1)" opacity="0.98" filter="url(#f1)"/>
    <path d="M-10,-2 C-52,-20 -72,6 -48,30 C-32,46 -12,36 -10,6 Z"
          fill="rgba(255,255,255,0.12)"/>

    <!-- Right wing -->
    <path d="M6,-6 C46,-36 86,-6 46,28 C30,44 8,38 6,6 Z"
          fill="url(#g2)" opacity="0.98" filter="url(#f1)"/>
    <path d="M10,-2 C52,-20 72,6 48,30 C32,46 12,36 10,6 Z"
          fill="rgba(255,255,255,0.12)"/>

    <!-- Body -->
    <g>
      <ellipse rx="6" ry="14" fill="#ffffff" opacity="0.95"/>
      <circle cx="0" cy="-18" r="4" fill="#ffffff" opacity="0.95"/>
    </g>

    <!-- Antennae -->
    <path d="M-2,-26 C-14,-36 -28,-44 -36,-50" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M2,-26 C14,-36 28,-44 36,-50" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
